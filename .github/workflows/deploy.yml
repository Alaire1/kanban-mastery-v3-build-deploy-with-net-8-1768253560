name: Deploy to Azure
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - name: Build and Test
        run: |
          dotnet build KanbanApi/KanbanApi.csproj -c Release
          dotnet test KanbanApi.Tests/KanbanApi.Tests.csproj -c Release

      - name: Install EF Core tools
        run: dotnet tool install --global dotnet-ef

      - name: Add dotnet tools to PATH
        run: echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Run EF Migrations
        working-directory: KanbanApi
        run: dotnet ef database update
        env:
          ConnectionStrings__DefaultConnection: ${{ secrets.AZURE_SQL_CONNECTION_STRING }}

      - name: Build Frontend
        working-directory: my-kanban
        run: |
          npm install
          npm run build
      - name: Copy Frontend to API wwwroot
        run: |
          rm -rf KanbanApi/wwwroot
          mkdir -p KanbanApi/wwwroot
          cp -r my-kanban/build/. KanbanApi/wwwroot/
      - name: Publish
        run: dotnet publish KanbanApi/KanbanApi.csproj -c Release -o ./publish
      - name: Deploy to Azure
        uses: azure/webapps-deploy@v2
        with:
          app-name: my-kanban-api
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish